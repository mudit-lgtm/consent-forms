name: Update Footer v2

on:
  workflow_dispatch:
  push:
    paths:
      - 'fix_footer.py'

jobs:
  run-script:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run footer update script
        run: python fix_footer.py

      - name: Commit & Push changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "auto: update footer v2 across all pages" || echo "No changes to commit"
          git push
