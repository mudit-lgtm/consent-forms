name: Fix Navigation Script

on:
  workflow_dispatch:   # 👈 इससे manual "Run workflow" button आएगा

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run script
        run: |
          python fix_nav.py

      - name: Commit & Push changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add -A
          git commit -m "auto: fix nav across pages" || echo "No changes to commit"
          git push
